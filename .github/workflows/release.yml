#
# Release pipeline — runs when a v* tag is pushed.
# Invokes goreleaser to build the five target binaries, produce
# archives + checksums, and create a draft GitHub Release.
#
# The draft must be reviewed and published manually (Stage F per
# 12_PLAN_VERIFIER_CLI__v1.md §5/F) so a human signs off on the
# Release notes before the artifacts go public.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
